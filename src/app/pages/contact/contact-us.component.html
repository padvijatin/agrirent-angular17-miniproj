<section class="contact-page">
  <mat-card class="contact-form-card">
    <mat-card-header>
      <mat-card-title>Contact Us</mat-card-title>
      <mat-card-subtitle>Send your question or project inquiry</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="contactForm" (ngSubmit)="submitForm()" class="contact-form">
        <mat-form-field appearance="outline">
          <mat-label>Full Name</mat-label>
          <input matInput type="text" formControlName="fullName">
          <mat-error *ngIf="contactForm.get('fullName')?.touched && contactForm.get('fullName')?.invalid">Full name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email">
          <mat-error *ngIf="contactForm.get('email')?.touched && contactForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="contactForm.get('email')?.touched && contactForm.get('email')?.hasError('email')">Enter a valid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone</mat-label>
          <input matInput type="text" formControlName="phone">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Subject</mat-label>
          <input matInput type="text" formControlName="subject">
          <mat-error *ngIf="contactForm.get('subject')?.touched && contactForm.get('subject')?.invalid">Subject is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Message</mat-label>
          <textarea matInput rows="6" formControlName="message"></textarea>
          <mat-error *ngIf="contactForm.get('message')?.touched && contactForm.get('message')?.hasError('required')">Message is required</mat-error>
          <mat-error *ngIf="contactForm.get('message')?.touched && contactForm.get('message')?.hasError('minlength')">Message should be at least 10 characters</mat-error>
        </mat-form-field>

        <p class="success-message" *ngIf="successMessage">{{ successMessage }}</p>

        <button mat-flat-button type="submit" class="agrirent-btn" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Sending...' : 'Send Message' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</section>
